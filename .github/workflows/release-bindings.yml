name: Release Bindings

on:
  push:
    tags:
      - "bindings-v*"

permissions:
  contents: read

jobs:
  release-meta:
    name: release metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Derive release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#bindings-v}"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate binding versions
        env:
          EXPECTED_VERSION: ${{ steps.meta.outputs.version }}
        run: |
          python - <<'PY'
          import json
          import os
          import pathlib
          import re
          import tomllib

          root = pathlib.Path.cwd()
          expected = os.environ["EXPECTED_VERSION"]

          node_package = json.loads((root / "bindings" / "gom-node" / "package.json").read_text(encoding="utf-8"))
          if node_package["version"] != expected:
              raise SystemExit(f"bindings/gom-node/package.json version {node_package['version']} != {expected}")

          python_project = tomllib.loads((root / "bindings" / "gom-python" / "pyproject.toml").read_text(encoding="utf-8"))
          python_version = python_project["project"]["version"]
          if python_version != expected:
              raise SystemExit(f"bindings/gom-python/pyproject.toml version {python_version} != {expected}")

          for manifest in (
              root / "bindings" / "gom-node" / "Cargo.toml",
              root / "bindings" / "gom-python" / "Cargo.toml",
          ):
              text = manifest.read_text(encoding="utf-8")
              match = re.search(r'^version\s*=\s*"([^"]+)"', text, flags=re.MULTILINE)
              if match is None:
                  raise SystemExit(f"Could not find version field in {manifest}")
              if match.group(1) != expected:
                  raise SystemExit(f"{manifest.relative_to(root)} version {match.group(1)} != {expected}")
          PY

  node-prebuilds:
    name: node prebuild (${{ matrix.prebuild_id }})
    runs-on: ${{ matrix.os }}
    needs: release-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            prebuild_id: linux-x64-gnu
          - os: windows-latest
            prebuild_id: win32-x64-msvc
          - os: macos-15-intel
            prebuild_id: darwin-x64
          - os: macos-14
            prebuild_id: darwin-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build native addon
        working-directory: bindings/gom-node
        run: node ./scripts/build-native.mjs --release --output .release-inputs/prebuilds/${{ matrix.prebuild_id }}/rom_node_native.node

      - name: Copy release asset
        working-directory: bindings/gom-node
        run: node -e "const fs=require('node:fs'); fs.mkdirSync('.release-assets',{recursive:true}); fs.copyFileSync('.release-inputs/prebuilds/${{ matrix.prebuild_id }}/rom_node_native.node','.release-assets/rom_node_native-${{ matrix.prebuild_id }}.node');"

      - name: Upload package prebuild
        uses: actions/upload-artifact@v4
        with:
          name: node-prebuild-package-${{ matrix.prebuild_id }}
          path: bindings/gom-node/.release-inputs

      - name: Upload release asset
        uses: actions/upload-artifact@v4
        with:
          name: node-prebuild-asset-${{ matrix.prebuild_id }}
          path: bindings/gom-node/.release-assets/rom_node_native-${{ matrix.prebuild_id }}.node

  node-package:
    name: npm package
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - node-prebuilds
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Download package prebuilds
        uses: actions/download-artifact@v4
        with:
          pattern: node-prebuild-package-*
          merge-multiple: true
          path: bindings/gom-node/.release-inputs

      - name: Stage multi-platform prebuilds
        working-directory: bindings/gom-node
        run: npm run stage:prebuilds -- --source .release-inputs/prebuilds --output prebuilds

      - name: Pack npm package
        working-directory: bindings/gom-node
        run: npm pack

      - name: Upload npm artifact
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: bindings/gom-node/*.tgz

      - name: Publish to npm
        working-directory: bindings/gom-node
        run: npm publish --provenance --access public

  python-wheels:
    name: python wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: release-meta
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-15-intel
          - macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --manifest-path bindings/gom-python/Cargo.toml --release --out bindings/gom-python/dist

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-wheels-${{ matrix.os }}
          path: bindings/gom-python/dist/*.whl

  python-sdist:
    name: python sdist
    runs-on: ubuntu-latest
    needs: release-meta

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --manifest-path bindings/gom-python/Cargo.toml --out bindings/gom-python/dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-sdist
          path: bindings/gom-python/dist/*.tar.gz

  publish-python:
    name: publish python
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs:
      - python-wheels
      - python-sdist
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  draft-release:
    name: draft github release
    runs-on: ubuntu-latest
    needs:
      - release-meta
      - node-package
      - python-wheels
      - python-sdist
    permissions:
      contents: write

    steps:
      - name: Download npm package
        uses: actions/download-artifact@v4
        with:
          name: npm-package
          path: dist

      - name: Download node prebuild assets
        uses: actions/download-artifact@v4
        with:
          pattern: node-prebuild-asset-*
          merge-multiple: true
          path: dist

      - name: Download python artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: python-*
          merge-multiple: true
          path: dist

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Create or update draft release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.release-meta.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release-meta.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          cat > release-notes.md <<EOF
          ROM bindings ${RELEASE_VERSION}

          Included assets:
          - npm package tarball
          - Python wheels
          - Python source distribution
          - SHA256 checksums

          Guides:
          - README: https://github.com/${REPOSITORY}/blob/${RELEASE_TAG}/README.md
          - Node guide: https://github.com/${REPOSITORY}/blob/${RELEASE_TAG}/bindings/gom-node/README.md
          - Python guide: https://github.com/${REPOSITORY}/blob/${RELEASE_TAG}/bindings/gom-python/README.md
          - LLM guide: https://github.com/${REPOSITORY}/blob/${RELEASE_TAG}/LLMS.md
          EOF

          if gh release view -R "${REPOSITORY}" "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release edit -R "${REPOSITORY}" "${RELEASE_TAG}" --draft=true --title "ROM bindings ${RELEASE_VERSION}" --notes-file release-notes.md
            gh release upload -R "${REPOSITORY}" "${RELEASE_TAG}" dist/* --clobber
          else
            gh release create -R "${REPOSITORY}" "${RELEASE_TAG}" dist/* --draft --title "ROM bindings ${RELEASE_VERSION}" --notes-file release-notes.md
          fi
