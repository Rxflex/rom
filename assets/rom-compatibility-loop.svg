<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 350" width="920" height="350">
  <defs>
    <style>
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 24px; font-weight: bold; fill: #f1f5f9; text-anchor: middle; }
      .box-title { font-family: monospace; font-size: 18px; font-weight: bold; fill: #ffffff; text-anchor: middle; }
      .box-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #cbd5e1; text-anchor: middle; }
      .arrow-text { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 600; fill: #f97316; text-anchor: middle; }
      .glowing-box { filter: drop-shadow(0 0 8px rgba(249, 115, 22, 0.4)); } /* Rust color glow */
      .glowing-arrow { filter: drop-shadow(0 0 4px rgba(241, 245, 249, 0.5)); }
    </style>
    
    <marker id="fine_arrowhead" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#f1f5f9" />
    </marker>
  </defs>

  <rect width="100%" height="100%" fill="#0e1116" rx="16" />

  <text x="460" y="45" class="title">MEASURABLE COMPATIBILITY LOOP</text>

  <g transform="translate(60, 100)" class="glowing-box">
    <rect x="0" y="0" width="220" height="130" rx="12" fill="#1f1a2a" stroke="#f97316" stroke-width="2.5" />
    <text x="110" y="40" class="box-title">1. ROM Runtime</text>
    <text x="110" y="70" class="box-text">Rust Web API Shims</text>
    <text x="110" y="90" class="box-text">Embedded JS Engine</text>
    <text x="110" y="110" class="box-text">Validation Shims</text>
  </g>

  <g transform="translate(350, 100)">
    <rect x="0" y="0" width="220" height="130" rx="12" fill="#142131" stroke="#2dd4bf" stroke-width="2.5" />
    <text x="110" y="40" class="box-title">2. Internal Probes</text>
    <text x="110" y="70" class="box-text">surface_snapshot()</text>
    <text x="110" y="90" class="box-text">fingerprint_probe()</text>
    <text x="110" y="110" class="box-text">Validation Harness</text>
  </g>

  <g transform="translate(640, 100)">
    <rect x="0" y="0" width="220" height="130" rx="12" fill="#1a1a20" stroke="#f1f5f9" stroke-width="2.5" />
    <text x="110" y="40" class="box-title">3. Reference Engine</text>
    <text x="110" y="70" class="box-text">Playwright Runner</text>
    <text x="110" y="90" class="box-text">Chromium Baseline</text>
    <text x="110" y="110" class="box-text">Diff &amp; Acceptance</text>
  </g>

  <path d="M 280 165 L 340 165" stroke="#f1f5f9" stroke-width="2.5" class="glowing-arrow" marker-end="url(#fine_arrowhead)" />
  <text x="310" y="155" class="arrow-text">Expose</text>

  <path d="M 570 165 L 630 165" stroke="#f1f5f9" stroke-width="2.5" class="glowing-arrow" marker-end="url(#fine_arrowhead)" />
  <text x="600" y="155" class="arrow-text">Compare</text>

  <path d="M 750 230 Q 750 290 460 290 Q 170 290 170 235" fill="none" stroke="#f1f5f9" stroke-width="2.5" stroke-dasharray="8 6" marker-end="url(#fine_arrowhead)" class="glowing-arrow" />
  <text x="460" y="315" class="arrow-text">Adjust &amp; Tighten Compatibility (Measurable Loop)</text>

</svg>
