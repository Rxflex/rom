<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260">
  <defs>
    <linearGradient id="romGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
    <linearGradient id="rustGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2dd4bf"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>

    <filter id="glowOrange" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="28" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="glowTeal" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="36" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <pattern id="crossGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 20 18 L 20 22 M 18 20 L 22 20" stroke="#1e293b" stroke-width="1" stroke-linecap="round"/>
    </pattern>

    <style>
      .rom-text { font-family: system-ui, -apple-system, sans-serif; font-size: 88px; font-weight: 900; fill: url(#romGrad); letter-spacing: 14px; }
      .sub-text { font-family: monospace; font-size: 16px; font-weight: 600; fill: #94a3b8; letter-spacing: 6px; }
      .tagline { font-family: system-ui, -apple-system, sans-serif; font-size: 13px; font-weight: 500; fill: #64748b; letter-spacing: 2px; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#080a0f" rx="16"/>
  <rect width="100%" height="100%" fill="url(#crossGrid)" rx="16"/>

  <rect x="0" y="0" width="920" height="4" fill="url(#rustGrad)" />

  <circle cx="380" cy="130" r="70" fill="#f97316" opacity="0.12" filter="url(#glowOrange)"/>
  <circle cx="540" cy="130" r="90" fill="#0d9488" opacity="0.12" filter="url(#glowTeal)"/>

  <g transform="translate(460, 65)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M -35 -12 L -50 0 L -35 12" fill="none" stroke="url(#rustGrad)" />
    <path d="M 35 -12 L 50 0 L 35 12" fill="none" stroke="url(#tealGrad)" />
    
    <rect x="-14" y="-14" width="28" height="28" rx="5" fill="none" stroke="#475569" stroke-width="2.5"/>
    <circle cx="-6" cy="-6" r="1.5" fill="#475569"/>
    <circle cx="0" cy="-6" r="1.5" fill="#475569"/>
    <circle cx="6" cy="-6" r="1.5" fill="#475569"/>
    <line x1="-14" y1="2" x2="14" y2="2" stroke="#475569" stroke-width="1.5" />
  </g>

  <text x="467" y="155" class="rom-text" text-anchor="middle">ROM</text>
  
  <text x="460" y="198" class="sub-text" text-anchor="middle">RUST BROWSER RUNTIME</text>

  <text x="460" y="230" class="tagline" text-anchor="middle">DETERMINISTIC &#x2022; MODULAR &#x2022; CHROMIUM-FREE</text>
</svg>
