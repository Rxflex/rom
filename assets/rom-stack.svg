<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" width="920" height="400">
  <defs>
    <linearGradient id="gradRuntime" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#581c87" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#9333ea" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gradCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ea580c" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="gradApi" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d9488" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0.3"/>
    </linearGradient>
    
    <style>
      .title { font-family: system-ui, -apple-system, sans-serif; font-size: 26px; font-weight: 700; fill: #f1f5f9; }
      .subtitle { font-family: system-ui, -apple-system, sans-serif; font-size: 15px; fill: #cbd5e1; }
      .box-title { font-family: monospace; font-size: 19px; font-weight: 600; fill: #e2e8f0; }
      .box-text { font-family: system-ui, -apple-system, sans-serif; font-size: 14px; fill: #f1f5f9; }
      .badge { font-family: monospace; font-size: 13px; font-weight: bold; fill: #ffffff; }
      .icon { fill: #f97316; } /* Rust icon color */
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#0e1116" rx="16" />
  <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
    <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#2a2a3a" stroke-width="0.5"/>
  </pattern>
  <rect width="100%" height="100%" fill="url(#grid)" rx="16"/>
  
  <g transform="translate(40, 30)">
    <text x="0" y="0" class="title" dominant-baseline="hanging">ROM Workspace Architecture</text>
    <text x="0" y="35" class="subtitle" dominant-baseline="hanging">A premium, modular stack for deterministic browser emulation</text>
  </g>

  <rect x="40" y="110" width="840" height="260" rx="14" fill="url(#gradRuntime)" stroke="#9333ea" stroke-width="2" />
  <rect x="40" y="110" width="180" height="38" rx="8" fill="#9333ea" />
  <text x="58" y="135" class="badge">crates/rom-runtime</text>
  <text x="235" y="135" class="box-text">High-level assembly, composes engine &amp; Web API</text>

  <g transform="translate(70, 170)">
    <rect x="0" y="0" width="370" height="170" rx="10" fill="url(#gradCore)" stroke="#f97316" stroke-width="1.8" />
    <rect x="0" y="0" width="160" height="34" rx="8" fill="#f97316" />
    <text x="14" y="23" class="badge">crates/rom-core</text>
    
    <text x="22" y="65" class="box-title">JS Engine Wrapper</text>
    <circle cx="28" cy="92" r="5" fill="#f97316"/>
    <text x="45" y="97" class="box-text">Lifecycle &amp; script execution</text>
    <circle cx="28" cy="122" r="5" fill="#f97316"/>
    <text x="45" y="127" class="box-text">Error handling &amp; memory</text>
    <circle cx="28" cy="152" r="5" fill="#f97316"/>
    <text x="45" y="157" class="box-text">Deterministic runtime context</text>
    
    <rect x="410" y="0" width="370" height="170" rx="10" fill="url(#gradApi)" stroke="#0d9488" stroke-width="1.8" />
    <rect x="410" y="0" width="160" height="34" rx="8" fill="#0d9488" />
    <text x="424" y="23" class="badge">crates/rom-webapi</text>

    <text x="432" y="65" class="box-title">Browser API Surface</text>
    <circle cx="438" cy="92" r="5" fill="#2dd4bf"/>
    <text x="455" y="97" class="box-text">Networking (fetch, Streams, etc.)</text>
    <circle cx="438" cy="122" r="5" fill="#2dd4bf"/>
    <text x="455" y="127" class="box-text">Crypto, Validation, DOM Shims</text>
    <circle cx="438" cy="152" r="5" fill="#2dd4bf"/>
    <text x="455" y="157" class="box-text">Worker &amp; BroadcastChannel shims</text>
  </g>

  <path d="M 440 255 L 480 255" stroke="#f1f5f9" stroke-width="3" stroke-dasharray="6 4" marker-end="url(#premium_arrow)" />
  
  <defs>
    <marker id="premium_arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f1f5f9" />
    </marker>
  </defs>
</svg>
